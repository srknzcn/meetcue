<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetCue — Google Meet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="body">
  <header class="header">
    <div class="header__brand">
      <span class="header__logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </span>
      <div class="header__text">
        <h1 class="header__title">MeetCue</h1>
        <p class="header__lead">Get pinged when your words come up</p>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="words">
      <h2 class="words__title">Your keywords</h2>
      <div class="words__boxes"></div>
    </section>

    <section class="create">
      <form autocomplete="off" class="create__form">
        <input type="text" class="create__input" id="alert-words"
          placeholder="Add a keyword, comma-separated…" aria-label="Add keywords" />
        <button id="add-btn" class="create__btn" type="submit" aria-label="Add keyword">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </form>
    </section>
  </main>

  <details class="settings">
    <summary class="settings__summary">
      <span class="settings__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </span>
      <span class="settings__label">Apple Watch · ntfy</span>
      <svg class="settings__chevron" viewBox="0 0 24 24" width="16" height="16" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </summary>

    <div class="settings__body">
      <label class="settings__toggle">
        <input type="checkbox" id="ntfy-enabled" class="settings__toggle-input" />
        <span class="settings__switch" aria-hidden="true"></span>
        <span class="settings__toggle-text">Bildirimleri ntfy'a ilet</span>
      </label>

      <input type="text" id="ntfy-server" class="settings__input" placeholder="Sunucu, ör. https://ntfy.sh"
        aria-label="ntfy sunucu adresi" autocomplete="off" spellcheck="false" />
      <input type="text" id="ntfy-topic" class="settings__input" placeholder="Topic, ör. meetcue-a7f3e9c2"
        aria-label="ntfy topic adı" autocomplete="off" spellcheck="false" />

      <div class="settings__actions">
        <button type="button" id="ntfy-save" class="settings__btn settings__btn--primary">Kaydet</button>
        <button type="button" id="ntfy-test" class="settings__btn">Test gönder</button>
      </div>

      <p id="ntfy-status" class="settings__status" role="status"></p>
    </div>
  </details>

  <footer class="footer" data-status="idle">
    <span class="footer__dot" aria-hidden="true"></span>
    <span id="alert-msg" class="footer__msg">Not on a call</span>
  </footer>

  <script src="./popup.js"></script>
</body>

</html>
